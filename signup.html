<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sign Up | Xcel Hub Training Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=20260420c">
</head>
<body class="auth-screen">
    <main class="auth-layout">
        <section class="auth-shell">
            <aside class="auth-side auth-side-form">
                <a class="auth-logo" href="signup.html" aria-label="Xcel Hub sign up">
                    <img src="assets/logo.png" alt="Xcel Hub logo">
                </a>
                <h1>Create account</h1>
                <p class="auth-subtitle">Sign up first, then use your account to log in and open the home page.</p>
                <p class="auth-message" id="authMessage" aria-live="polite"></p>
                <form class="auth-form is-visible" id="signupForm" novalidate>
                    <div class="field-row">
                        <label>
                            First name
                            <input type="text" name="firstName" autocomplete="given-name" placeholder="First name" required>
                        </label>
                        <label>
                            Last name
                            <input type="text" name="lastName" autocomplete="family-name" placeholder="Last name" required>
                        </label>
                    </div>
                    <label>
                        Email address
                        <input type="email" name="email" autocomplete="email" placeholder="Enter your email" required>
                    </label>
                    <label class="password-field">
                        Password
                        <span class="password-wrap">
                            <input type="password" id="signupPassword" name="password" autocomplete="new-password" placeholder="Create password" required minlength="6">
                            <button class="icon-button" type="button" data-password-toggle="signupPassword" aria-label="Show password">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M12 5c5.5 0 9.9 4 11 7-1.1 3-5.5 7-11 7S2.1 15 1 12c1.1-3 5.5-7 11-7Zm0 2C8 7 4.4 10 3.4 12 4.4 14 8 17 12 17s7.6-3 8.6-5C19.6 10 16 7 12 7Zm0 2.5A2.5 2.5 0 1 1 12 14a2.5 2.5 0 0 1 0-5Z"/>
                                </svg>
                            </button>
                        </span>
                    </label>
                    <button class="primary-button full-width" type="submit">Create Account</button>
                    <p class="form-footnote">
                        Already registered?
                        <a class="link-button inline" href="login.html">Log in here</a>
                    </p>
                </form>
            </aside>
            <aside class="auth-side auth-side-visual" aria-hidden="true">
                <img src="assets/photo4.jpg" alt="">
                <div class="auth-visual-overlay"></div>
            </aside>
        </section>
    </main>
    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
    <script src="js/script.js?v=20260420c"></script>
</body>
</html>
